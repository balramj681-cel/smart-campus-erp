    <!-- cap top (diamond) -->
    <polygon points="0,-72 148,-14 0,44 -148,-14" fill="#FFFFFF"/>
    <!-- cap base -->
    <path d="M -84 6 L -84 58 C -84 92 -34 118 0 118 C 34 118 84 92 84 58 L 84 6 L 0 40 Z" fill="#EEF2FF"/>
    <!-- tassel string -->
    <line x1="148" y1="-14" x2="148" y2="64" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <!-- tassel -->
    <circle cx="148" cy="72" r="11" fill="#FBBF24"/>
    <path d="M 148 82 L 138 108 L 158 108 Z" fill="#FBBF24"/>
  </g>

  <!-- Base / campus building hint -->
  <rect x="150" y="358" width="212" height="14" rx="7" fill="#FFFFFF" opacity="0.9"/>
