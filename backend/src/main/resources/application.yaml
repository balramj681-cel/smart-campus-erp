spring:
  application:
    name: backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB


  management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    mail:
      enabled: false  

server:
  port: ${PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: smart-campus-erp
    access-token-expiration: ${JWT_ACCESS_EXPIRY:900000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRY:604800000}

otp:
  expiry-minutes: 10
  max-attempts: 3

twilio:
  twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:disabled}
  auth-token: ${TWILIO_AUTH_TOKEN:disabled}
  phone-number: ${TWILIO_PHONE_NUMBER:+10000000000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}